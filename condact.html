<!DOCTYPE html>
<html>
    <head>
        <title>conduct page</title>
        <link rel="stylesheet" href="conduct.css">
    </head>
<body>
    <div class="main-box">

    <div class="form-box">
      <h2>Contact us and our friendly service will respond to all of your 
        inquiries and explains about other discounts and salon offers</h2>
        <form>
           <div class="input-box">
            <label>Your Name</label>
            <input type="text"required>
           </div>
           <div class="input-box">
            <label>Your Email</label>
            <input type="text"required>
           </div>
           <div class="input-box">
            <label>Phone No</label>
            <input type="tel"required>
           </div>

           <div class="input-box">
            <label> Select Service</label>
             <select required>
                <option value=""disabled selected>please choose an option</option>
                <option value="haircut">haircut</option>
                <option value="skincare">skincare</option>
                <option value="bridel-makeup">bridel-makeup</option>
             </select>
           </div>
             <div class="input-box">
                <label>Select Date</label>
                <input type="date"required>
                </div>
                
                <button type="submit" class="submit-btn">submit</button>
        </form>
    </div>
           <div class="conduct-box">
            <h3>CONDUCT INFORMATION</h3>

            <div class="contact-infro">
                <div class="info-item">
                    <span class="icon"> 
                        <img src="location-point.png" alt="Location">
                    </span>
                    <p>AA-144, 2nd floor, Tamilvanan Complex 3rd Avenue, Anna Nagar, Chennai, India 600040</p>
            </div>

            

            <div class="info-item">
                <span class="icon"> 
                    <img src="call.png" alt="Phone">
                </span>
                <p>+1123456789</p>
            </div>

            <div class="info-item">
                <span class="icon">
                    <img src="mail.png" alt="Email" >
                </span>
                <p>urbanglowsalon.india@gmail.com</p>
            </div>

           </div>
           
        </div>
    </div>
</body>
</html>
